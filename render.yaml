services:
  # --- Backend (Django) ---
  - type: web
    name: cinebook-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn --chdir backend config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinebook-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "cinebook-backend.onrender.com"
      - key: PYTHON_VERSION
        value: 3.12.3

  # --- Frontend (React/Vite) ---
  - type: web
    name: cinebook-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://cinebook-backend.onrender.com/api

databases:
  - name: cinebook-db
    databaseName: cinebook_db
    user: cinebook_user
    plan: free
